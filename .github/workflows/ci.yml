name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Reprendre possession du workspace
        run: docker run --rm -v "${{ github.workspace }}":/ws alpine chown -R "$(id -u)":"$(id -g)" /ws || true

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Creer le fichier .env
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_DB: ${{ secrets.REDIS_DB }}
        run: |
          cat > .env <<EOF
          DB_HOST=$DB_HOST
          DB_PORT=$DB_PORT
          DB_NAME=$DB_NAME
          DB_USER=$DB_USER
          DB_PASSWORD=$DB_PASSWORD
          REDIS_HOST=$REDIS_HOST
          REDIS_PORT=$REDIS_PORT
          REDIS_DB=$REDIS_DB
          EOF

      - name: Creer le reseau Docker (si absent)
        run: docker network create labo05-network || true

      - name: Executer les tests (MySQL + Redis via Compose)
        run: docker compose run --rm store_manager pytest

      - name: Nettoyer les conteneurs de test
        if: always()
        run: docker compose down --remove-orphans

  deploy:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: self-hosted
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Creer le fichier .env
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_DB: ${{ secrets.REDIS_DB }}
        run: |
          cat > .env <<EOF
          DB_HOST=$DB_HOST
          DB_PORT=$DB_PORT
          DB_NAME=$DB_NAME
          DB_USER=$DB_USER
          DB_PASSWORD=$DB_PASSWORD
          REDIS_HOST=$REDIS_HOST
          REDIS_PORT=$REDIS_PORT
          REDIS_DB=$REDIS_DB
          EOF

      - name: Creer le reseau Docker (si absent)
        run: docker network create labo05-network || true

      - name: Deployer (build + up)
        run: docker compose up -d --build

      - name: Etat des conteneurs
        run: docker compose ps
